<!DOCTYPE html>
<html lang="ru">
<head>

        padding: 15px;

        margin: 0;
        color: #003366;
    }

    .cards {

    img {

    }

    a {

        color: black;

        margin-top: 10px;

    }
</style>
</head>

<body>

<header>
    <h1>Достопримечательности России</h1>
</header>

<div class="cards">

    <div class="card">
        <a href="moscow.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d4/Red_Square_Moscow.jpg">
            <div class="title">Москва — Красная площадь</div>
        </a>
    </div>

    <div class="card">
        <a href="spb.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Winter_Palace_Panorama_4.jpg">

        </a>
    </div>

</div>
